server {
    listen __PORT__ default_server;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 560M;
    client_body_timeout 600s;
    charset utf-8;

    # Security headers (admin panel + API host had none).
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Serve static files directly (Filament CSS/JS, images), fall back to Laravel.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    # NOTE: /robots.txt is intentionally NOT special-cased — it must fall through
    # to Laravel (SitemapController@robots) via the try_files rule above.

    # Pass PHP to PHP-FPM (multiple workers = parallel requests).
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Deny access to hidden files (except .well-known).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
