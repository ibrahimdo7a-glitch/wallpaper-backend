server {
    listen __PORT__ default_server;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 55M;
    charset utf-8;

    # Serve static files directly (Filament CSS/JS, images), fall back to Laravel.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Pass PHP to PHP-FPM (multiple workers = parallel requests).
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Deny access to hidden files (except .well-known).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
